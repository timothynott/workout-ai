name: Deploy

on:
  push:

jobs:
  deploy:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Tessl skills
        run: npx tessl install --yes
        env:
          TESSL_TOKEN: ${{ secrets.TESSL_TOKEN }}

      - name: Derive worker name
        id: worker
        run: |
          if [ "$GITHUB_REF_NAME" = "main" ]; then
            NAME="workout-ai"
          else
            SANITIZED=$(echo "$GITHUB_REF_NAME" \
              | tr '[:upper:]' '[:lower:]' \
              | sed 's/[^a-z0-9]/-/g' \
              | sed 's/-\+/-/g' \
              | sed 's/^-//;s/-$//')
            NAME="workout-ai-${SANITIZED}"
            # Cloudflare worker names are max 63 chars
            NAME="${NAME:0:63}"
          fi
          echo "name=$NAME" >> $GITHUB_OUTPUT
          echo "Deploying as worker: $NAME"

      - name: Build
        run: pnpm cf:build

      - name: Deploy
        run: npx wrangler deploy --name ${{ steps.worker.outputs.name }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Print worker name
        env:
          WORKER_NAME: ${{ steps.worker.outputs.name }}
        run: echo "Deployed worker name - $WORKER_NAME - find the URL in your Cloudflare Workers dashboard"
