name: Deploy

on:
  push:

jobs:
  deploy:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4

      - name: Cache .next/cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('src/**/*.ts', 'src/**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-
            ${{ runner.os }}-nextjs-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Derive worker name
        id: worker
        run: |
          if [ "$GITHUB_REF_NAME" = "main" ]; then
            NAME="workout-ai"
          elif [ "$GITHUB_REF_NAME" = "staging" ]; then
            NAME="workout-ai-staging"
          else
            SANITIZED=$(echo "$GITHUB_REF_NAME" \
              | tr '[:upper:]' '[:lower:]' \
              | sed 's/[^a-z0-9]/-/g' \
              | sed 's/-\+/-/g' \
              | sed 's/^-//;s/-$//')
            NAME="workout-ai-${SANITIZED}"
            # Cloudflare worker names are max 63 chars
            NAME="${NAME:0:63}"
          fi
          echo "name=$NAME" >> $GITHUB_OUTPUT
          echo "Deploying as worker: $NAME"

      - name: Build
        run: pnpm cf:build
        env:
          AUTH_SECRET: build-time-placeholder

      - name: Deploy
        run: npx wrangler deploy --name ${{ steps.worker.outputs.name }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set Worker secrets
        run: |
          WORKER="${{ steps.worker.outputs.name }}"
          push_secret() {
            local key=$1 val=$2
            [ -z "$val" ] && return
            echo "$val" | npx wrangler secret put "$key" --name "$WORKER"
          }
          push_secret AUTH_SECRET          "$AUTH_SECRET"
          push_secret RESEND_API_KEY       "$RESEND_API_KEY"
          push_secret RESEND_FROM_ADDRESS  "$RESEND_FROM_ADDRESS"
          push_secret ALLOWED_EMAILS       "$ALLOWED_EMAILS"
          push_secret ENCRYPTION_KEY       "$ENCRYPTION_KEY"
          push_secret GOOGLE_CLIENT_ID     "$GOOGLE_CLIENT_ID"
          push_secret GOOGLE_CLIENT_SECRET "$GOOGLE_CLIENT_SECRET"
        env:
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          AUTH_SECRET:           ${{ secrets.AUTH_SECRET }}
          RESEND_API_KEY:        ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_ADDRESS:   ${{ secrets.RESEND_FROM_ADDRESS }}
          ALLOWED_EMAILS:        ${{ secrets.ALLOWED_EMAILS }}
          ENCRYPTION_KEY:        ${{ secrets.ENCRYPTION_KEY }}
          GOOGLE_CLIENT_ID:      ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET:  ${{ secrets.GOOGLE_CLIENT_SECRET }}

      - name: Print worker name
        env:
          WORKER_NAME: ${{ steps.worker.outputs.name }}
        run: echo "Deployed worker name - $WORKER_NAME - find the URL in your Cloudflare Workers dashboard"
